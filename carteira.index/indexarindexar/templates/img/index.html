<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/carteira.index/indexarindexar/templates/img/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

</head>

<body>

    <h1>CARTEIRA DE FINANÇAS</h1>
    <p>Bem-vindo ao seu espaço de finanças!</p>

<!-- buttons de criação de saldo -->
<div class="icon-row">
 <button class="icon-container cartao"> 
    <img src="icons8-cartão-48.png" alt="Cartão">
    <span class="icon-text">CARTÃO</span>
    </button> 


<button class="icon-container compras"> 
    <img src="icons8-pagar-48.png" alt="Compras">
    <span class="icon-text">COMPRAS</span>
    
</button>

 <button class="icon-container gastos"> 
        <img src="icons8-lista-de-tarefas-48.png" alt="Gastos Fixos">
        <span class="icon-text">FIXOS</span>
        
</button>


<button  class="icon-container poupanca"> 
        <img src="icons8-poupança-48.png" alt="Poupança">
        <span class="icon-text">POUPANÇA</span>
</button>
</div>


<!-- resumo de saldo -->
<section class="resumo">
 <div class="resumo-card">
    <h2>Saldo atual</h2>
    <p class="valor">R$ 0,00</p>
    <p class="texto">Disponivel para o mês</p>
  </div>

 <div class="resumo-card">
      <h2>Gastos do mês</h2>  
      <p class="valor">R$ 0,00</p>
      <p class="texto">Gastos</p>
 </div>

 <div class="resumo-card">
        <h2> Economia </h2>
        <p class="valor">R$ 0,00 </p>
        <p class="texto">Guardado até agora </p>
  </div>
</section>

<!--metas do mês -->
<section class="meta-mes">
    <div>
        <h2>Meta do Mês</h2>
        <p>Você completou 0% da sua meta de economia.</p>
    </div>
    <div class="barra-meta">
        <div class="progresso-meta">
    </div>
</section>

</body>
</html>
